<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Card Live Editor</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; display: flex; height: 100vh; overflow: hidden; }
    .editor { width: 380px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
    .editor-header { padding: 16px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .editor-header h2 { margin: 0; font-size: 1.1rem; color: #fbbf24; }
    .editor-content { flex: 1; overflow-y: auto; padding: 16px; }
    .preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
    iframe { width: 100%; height: 100%; border: none; background: #fff; }
    
    label { display: block; margin-top: 12px; font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; background: #0f172a; border: 1px solid #475569; color: #f1f5f9; border-radius: 6px; font-size: 0.9rem; }
    input:focus, textarea:focus { outline: none; border-color: #fbbf24; }
    input[type="color"] { height: 36px; padding: 2px; cursor: pointer; }
    
    button { margin-top: 12px; padding: 10px 16px; background: #fbbf24; color: #0f172a; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; transition: background 0.2s; }
    button:hover { background: #f59e0b; }
    button.secondary { background: #334155; color: #f1f5f9; margin-top: 8px; }
    button.secondary:hover { background: #475569; }
    button.danger { background: #ef4444; color: white; width: auto; padding: 4px 8px; font-size: 0.75rem; margin-top: 0; }
    
    .event-item { background: #0f172a; padding: 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #334155; position: relative; }
    .event-item .remove-btn { position: absolute; top: 8px; right: 8px; }
    .event-item label { margin-top: 8px; }
    .event-item input { margin-top: 2px; }
    
    .tabs { display: flex; border-bottom: 1px solid #334155; background: #1e293b; position: sticky; top: 0; z-index: 10; }
    .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.8rem; font-weight: 600; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: #fbbf24; border-bottom-color: #fbbf24; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="editor">
    <div class="editor-header">
      <h2>✦ Invitation Editor</h2>
      <button onclick="exportStandalone()" style="width:auto; margin:0; padding: 8px 16px; font-size: 0.8rem;">⬇ Export</button>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('theme')">Theme</div>
      <div class="tab" onclick="switchTab('couple')">Couple</div>
      <div class="tab" onclick="switchTab('events')">Events</div>
      <div class="tab" onclick="switchTab('gallery')">Gallery</div>
      <div class="tab" onclick="switchTab('venue')">Venue</div>
    </div>

    <div class="editor-content">
      <!-- THEME -->
      <div id="tab-theme" class="tab-content active">
        <label>Background Dark</label><input type="color" id="bgDark" value="#1a0f0a">
        <label>Background Mid</label><input type="color" id="bgMid" value="#2e1a0f">
        <label>Primary Color</label><input type="color" id="primary" value="#8b3a1a">
        <label>Gold Accent</label><input type="color" id="gold" value="#ff7e5f">
        <label>Text Ivory</label><input type="color" id="ivory" value="#fff5f0">
        <label>Particle Color</label><input type="color" id="particle" value="#ff7e5f">
      </div>

      <!-- COUPLE -->
      <div id="tab-couple" class="tab-content">
        <label>Bride Name</label><input id="bride" value="Aanya">
        <label>Groom Name</label><input id="groom" value="Rohan">
        <label>Bride Family</label><input id="brideFamily" value="The Sharma Family">
        <label>Groom Family</label><input id="groomFamily" value="The Mehta Family">
        <label>Hashtag</label><input id="coupleHashtag" value="#AanyaWedsRohan">
        <label>Wedding Date (Display)</label><input id="weddingDateDisplay" value="5th December 2026">
        <label>Wedding Time</label><input id="weddingTimeDisplay" value="7:00 PM onwards">
        <label>Wedding DateTime (Countdown)</label><input type="datetime-local" id="weddingDateTime" value="2026-12-05T19:00:00">
        <label>Invite Message</label><textarea id="inviteMessage" rows="3">Together with our families, we joyfully invite you to share in the celebration of our union.</textarea>
        <label>Footer Note</label><input id="footerNote" value="With love & gratitude — Aanya & Rohan 💚">
      </div>

      <!-- EVENTS -->
      <div id="tab-events" class="tab-content">
        <div id="events-list"></div>
        <button class="secondary" onclick="addEvent()">+ Add Event</button>
      </div>

      <!-- GALLERY -->
      <div id="tab-gallery" class="tab-content">
        <div id="photos-list"></div>
        <button class="secondary" onclick="addPhoto()">+ Add Photo URL</button>
        <label>Background Music URL</label><input id="musicUrl" value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
      </div>

      <!-- VENUE -->
      <div id="tab-venue" class="tab-content">
        <label>Venue Name</label><input id="venueName" value="The Grand Leela Palace">
        <label>Venue Address</label><input id="venueAddress" value="Diplomatic Enclave, Chanakyapuri, New Delhi">
        <label>Google Maps Link</label><input id="venueMapLink" value="https://maps.google.com/?q=The+Leela+Palace+New+Delhi">
        <label>Map Embed URL (iframe src)</label><input id="venueMapEmbedUrl" value="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3503.2!2d77.1855!3d28.5975!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390d1d4c1b1b1b1b%3A0x1b1b1b1b1b1b1b1b!2sThe%20Leela%20Palace%20New%20Delhi!5e0!3m2!1sen!2sin!4v1234567890">
        <label>Dress Code</label><input id="dressCode" value="Formal / Ethnic">
        <label>Dress Code Colors</label><input id="dressCodeColors" value="Maroon · Gold · Ivory">
        <label>RSVP Deadline</label><input id="rsvpDeadline" value="1st December 2026">
        <label>RSVP WhatsApp</label><input id="rsvpWhatsApp" value="+919999999999">
      </div>
    </div>
  </div>

  <div class="preview">
    <iframe id="preview-frame" src="index.html"></iframe>
  </div>

  <script>
    let events = [
      { name: "Mehendi Ceremony", date: "3rd December", time: "11:00 AM", venue: "Sharma Residence", icon: "🌿" },
      { name: "Sangeet Night", date: "4th December", time: "7:00 PM", venue: "The Grand Leela", icon: "🎶" },
      { name: "Wedding Ceremony", date: "5th December", time: "7:00 PM", venue: "Garden Lawn", icon: "💍" },
      { name: "Reception", date: "5th December", time: "9:30 PM", venue: "Ballroom", icon: "🥂" }
    ];
    
    let photos = [
      "https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80",
      "https://images.unsplash.com/photo-1591604021695-0c69b7c05981?w=800&q=80",
      "https://images.unsplash.com/photo-1606800052052-a08af7148866?w=800&q=80"
    ];

    function switchTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
    }

    function renderEvents() {
      const container = document.getElementById('events-list');
      container.innerHTML = '';
      events.forEach((ev, i) => {
        const div = document.createElement('div');
        div.className = 'event-item';
        div.innerHTML = `
          <button class="danger remove-btn" onclick="removeEvent(${i})">✕</button>
          <label>Name</label><input class="ev-name" value="${ev.name}">
          <div style="display:flex;gap:8px"><div style="flex:1"><label>Date</label><input class="ev-date" value="${ev.date}"></div><div style="flex:1"><label>Time</label><input class="ev-time" value="${ev.time}"></div></div>
          <label>Venue</label><input class="ev-venue" value="${ev.venue}">
          <label>Icon</label><input class="ev-icon" value="${ev.icon}" style="width:60px;">
        `;
        container.appendChild(div);
      });
    }

    function renderPhotos() {
      const container = document.getElementById('photos-list');
      container.innerHTML = '';
      photos.forEach((url, i) => {
        const div = document.createElement('div');
        div.className = 'event-item';
        div.style.display = 'flex';
        div.style.gap = '8px';
        div.style.alignItems = 'center';
        div.innerHTML = `
          <input class="ph-url" value="${url}" style="flex:1;">
          <button class="danger" onclick="removePhoto(${i})">✕</button>
        `;
        container.appendChild(div);
      });
    }

    function addEvent() { events.push({ name: "New Event", date: "Date", time: "Time", venue: "Venue", icon: "✨" }); renderEvents(); sendUpdate(); }
    function removeEvent(i) { events.splice(i, 1); renderEvents(); sendUpdate(); }
    function addPhoto() { photos.push("https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80"); renderPhotos(); sendUpdate(); }
    function removePhoto(i) { photos.splice(i, 1); renderPhotos(); sendUpdate(); }

    function getState() {
      return {
        theme: {
          colors: {
            bgDark: document.getElementById('bgDark').value,
            bgMid: document.getElementById('bgMid').value,
            primary: document.getElementById('primary').value,
            gold: document.getElementById('gold').value,
            ivory: document.getElementById('ivory').value,
            particle: document.getElementById('particle').value
          }
        },
        wedding: {
          bride: document.getElementById('bride').value,
          groom: document.getElementById('groom').value,
          brideFamily: document.getElementById('brideFamily').value,
          groomFamily: document.getElementById('groomFamily').value,
          coupleHashtag: document.getElementById('coupleHashtag').value,
          weddingDateDisplay: document.getElementById('weddingDateDisplay').value,
          weddingTimeDisplay: document.getElementById('weddingTimeDisplay').value,
          weddingDateTime: document.getElementById('weddingDateTime').value,
          inviteMessage: document.getElementById('inviteMessage').value,
          footerNote: document.getElementById('footerNote').value,
          venueName: document.getElementById('venueName').value,
          venueAddress: document.getElementById('venueAddress').value,
          venueMapLink: document.getElementById('venueMapLink').value,
          venueMapEmbedUrl: document.getElementById('venueMapEmbedUrl').value,
          dressCode: document.getElementById('dressCode').value,
          dressCodeColors: document.getElementById('dressCodeColors').value,
          rsvpDeadline: document.getElementById('rsvpDeadline').value,
          rsvpWhatsApp: document.getElementById('rsvpWhatsApp').value,
          musicUrl: document.getElementById('musicUrl').value,
          events: Array.from(document.querySelectorAll('#events-list .event-item')).map(el => ({
            name: el.querySelector('.ev-name').value,
            date: el.querySelector('.ev-date').value,
            time: el.querySelector('.ev-time').value,
            venue: el.querySelector('.ev-venue').value,
            icon: el.querySelector('.ev-icon').value
          })),
          photos: Array.from(document.querySelectorAll('.ph-url')).map(el => el.value)
        }
      };
    }

    function sendUpdate() {
      document.getElementById('preview-frame').contentWindow.postMessage({ type: 'UPDATE_WEDDING', ...getState() }, '*');
    }

    // Bind all inputs to sendUpdate
    document.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('input', sendUpdate);
    });
    document.getElementById('events-list').addEventListener('input', sendUpdate);
    document.getElementById('photos-list').addEventListener('input', sendUpdate);

    function exportStandalone() {
      const state = getState();
      // We inline everything to avoid file:// CORS fetch errors
      const cssContent = `@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap');
:root{--bg-dark:${state.theme.colors.bgDark};--bg-mid:${state.theme.colors.bgMid};--c-primary:${state.theme.colors.primary};--c-primary-light:#7a1c1c;--c-gold:${state.theme.colors.gold};--c-gold-light:#e8c97a;--c-gold-shine:#f5e0a0;--c-ivory:${state.theme.colors.ivory};--text-muted:#a08575;--particle-color:${state.theme.colors.particle};--font-display:'Cinzel',serif;--font-body:'Cormorant Garamond',serif;--font-sans:'Raleway',sans-serif;--glow:0 0 30px rgba(201,168,76,0.3);--shadow-deep:0 20px 60px rgba(0,0,0,0.5)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;font-size:16px}body{background:var(--bg-dark);color:var(--c-ivory);font-family:var(--font-body);line-height:1.7;overflow-x:hidden}.gold{color:var(--c-gold)}.center{text-align:center}.section{padding:80px 20px;position:relative}.section-inner{max-width:860px;margin:0 auto}.divider{display:flex;align-items:center;gap:16px;margin:32px auto;max-width:400px}.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--c-gold),transparent)}.divider-diamond{width:8px;height:8px;background:var(--c-gold);transform:rotate(45deg);flex-shrink:0}.section-title{font-family:var(--font-display);font-size:clamp(1.4rem,4vw,2rem);letter-spacing:0.15em;color:var(--c-gold);text-align:center;text-transform:uppercase;margin-bottom:8px}.section-subtitle{font-family:var(--font-body);font-style:italic;color:var(--text-muted);text-align:center;font-size:1.1rem;margin-bottom:48px}#particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.5}#door-overlay{position:fixed;inset:0;z-index:1000;perspective:1200px;display:flex;align-items:center;justify-content:center;background:var(--bg-dark);overflow:hidden;transition:opacity 0.8s ease 0.6s}#door-overlay.gone{opacity:0;pointer-events:none}#door-overlay.hidden{display:none}.door-panel{position:absolute;top:0;width:50%;height:100%;background:linear-gradient(160deg,var(--c-primary) 0%,var(--bg-mid) 55%,var(--bg-dark) 100%);transition:transform 1.5s cubic-bezier(0.4,0,0.2,1);box-shadow:inset 0 0 50px rgba(0,0,0,0.8)}.door-left{left:0;transform-origin:left center;border-right:1px solid var(--c-gold)}.door-right{right:0;transform-origin:right center;border-left:1px solid var(--c-gold)}#door-overlay.opening .door-left{transform:rotateY(-100deg)}#door-overlay.opening .door-right{transform:rotateY(100deg)}#door-overlay.opening .portal-btn{opacity:0;transform:translate(-50%,-50%) scale(0.5);transition:all 0.5s ease}.portal-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:transform 0.3s ease}.portal-btn:hover{transform:translate(-50%,-50%) scale(1.05)}.ring{position:absolute;border-radius:50%;pointer-events:none}.r-outer{inset:0;background:radial-gradient(circle at 30% 30%,var(--c-primary-light),var(--bg-mid));border:4px solid var(--c-gold);box-shadow:0 10px 30px rgba(0,0,0,0.6),inset 0 0 15px rgba(0,0,0,0.5)}.r-mid{inset:14px;background:radial-gradient(circle at 70% 70%,var(--bg-mid),var(--c-primary));border:2px solid var(--c-gold);box-shadow:inset 0 0 10px rgba(0,0,0,0.6)}.r-inner{inset:28px;background:linear-gradient(135deg,var(--c-primary),var(--c-primary-light));border:1px solid var(--c-gold-light);box-shadow:0 4px 15px rgba(0,0,0,0.5)}.btn-content{position:relative;z-index:2;text-align:center;color:var(--c-ivory)}.couple-names{display:block;font-family:var(--font-display);font-size:0.9rem;color:var(--c-gold-light);letter-spacing:1px;line-height:1.2;margin-bottom:6px}.couple-names em{font-family:var(--font-body);font-style:italic;font-size:0.85em}.tap-hint{display:block;font-family:var(--font-sans);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;opacity:0.8}.countdown-compact{display:flex;justify-content:center;align-items:baseline;gap:12px;flex-wrap:nowrap;white-space:nowrap;margin-top:16px}.cd-unit{display:inline-flex;align-items:baseline;gap:3px}.cd-unit strong{font-family:var(--font-display);font-size:clamp(1.1rem,3vw,1.5rem);color:var(--c-gold);text-shadow:var(--glow);line-height:1}.cd-unit small{font-family:var(--font-sans);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);opacity:0.8}.cd-sep{color:var(--c-gold);font-size:1rem;opacity:0.4;transform:translateY(-2px)}#invitation{position:relative;z-index:1;opacity:0;transition:opacity 1s e     function setupScratchCard() {

      const check = () => { if (cleared) return; const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data; let t = 0; for(let i = 3; i < d.length; i += 4) if(d[i] === 0) t++; if(t / (canvas.width * canvas.height) > 0.5) { cleared = true; canvas.style.opacity = 0; canvas.style.pointerEvents = 'none'; const msg = document.getElementById('scratch-cleared'); if(msg) msg.classList.add('show'); } };
      canvas.addEventListener('mousedown', e => { drawing = true; scratch(getPos(e).x, getPos(e).y); });
      canvas.addEventListener('mousemove', e => { if(!drawing) return; scratch(getPos(e).x, getPos(e).y); check(); });
      canvas.addEventListener('mouseup', () => drawing = false);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; scratch(getPos(e).x, getPos(e).y); }, {passive: false});
      canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!drawing) return; scratch(getPos(e).x, getPos(e).y); check(); }, {passive: false});
      canvas.addEventListener('touchend', () => drawing = false);
    }
    function setupSlideshow() {
      const track = document.getElementById('slideshow-track'), dots = document.getElementById('slide-dots');
      if (!track || !dots) return;
      window.curSlide = 0;
      window.go = n => { window.curSlide = (n + WEDDING.photos.length) % WEDDING.photos.length; track.style.transform = \`translateX(-\${window.curSlide * 100}%)\`; document.querySelectorAll('.slide-dot').forEach((d, i) => d.classList.toggle('active', i === window.curSlide)); };
      document.getElementById('slide-prev').onclick = () => window.go(window.curSlide - 1);
      document.getElementById('slide-next').onclick = () => window.go(window.curSlide + 1);
      setInterval(() => window.go(window.curSlide + 1), 4000);
    }
    function setupParticles() {
      const c = document.getElementById('particles-canvas'); if (!c) return;
      const ctx = c.getContext('2d'), p = [];
      const resize = () => { c.width = window.innerWidth; c.height = window.innerHeight; }; resize(); window.addEventListener('resize', resize);
      class Part { constructor() { this.reset(); } reset() { this.x = Math.random() * c.width; this.y = Math.random() * c.height; this.r = Math.random() * 1.5 + 0.5; this.vx = (Math.random() - 0.5) * 0.4; this.vy = -(Math.random() * 0.3 + 0.1); this.a = Math.random() * 0.5 + 0.2; } update() { this.x += this.vx; this.y += this.vy; if(this.y < -5) this.reset(); } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim().replace(')', \`,\${this.a})\`).replace('rgb', 'rgba'); ctx.fill(); } }
      for(let i = 0; i < 70; i++) p.push(new Part());
      const loop = () => { ctx.clearRect(0, 0, c.width, c.height); p.forEach(x => { x.update(); x.draw(); }); requestAnimationFrame(loop); }; loop();
    }
    function setupMusic() {
      const audio = document.getElementById('bg-music'); if (!audio) return;
      audio.src = WEDDING.musicUrl || '';
      window.toggleMusic = () => {
        const btn = document.getElementById('music-btn');
        if (audio.paused) { audio.volume = 0.35; audio.play().catch(() => {}); btn.textContent = '♫'; btn.classList.add('playing'); } 
        else { audio.pause(); btn.textContent = '♪'; btn.classList.remove('playing'); }
      };
    }
    window.submitRSVP = () => {
      const n = document.getElementById('rsvp-name').value.trim(), p = document.getElementById('rsvp-phone').value.trim(), a = document.getElementById('rsvp-attending').value, g = document.getElementById('rsvp-guests').value, m = document.getElementById('rsvp-msg').value.trim();
      if(!n || !a) { alert('Please fill name and attendance.'); return; }
      if(WEDDING.rsvpWhatsApp) {
        const txt = \`*Wedding RSVP*\\nName: \${n}\\nPhone: \${p}\\nAttending: \${a === 'yes' ? 'Yes ✅' : 'No ❌'}\\nGuests: \${g || 1}\\nMessage: \${m || '—'}\`;
        window.open(\`https://wa.me/\${WEDDING.rsvpWhatsApp.replace(/\\D/g, '')}?text=\${encodeURIComponent(txt)}\`, '_blank');
      }
      document.getElementById('rsvp-form-wrap').style.display = 'none';
      document.getElementById('rsvp-success').style.display = 'flex';
    };
  <\/script>
</body>
